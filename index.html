<style>
  :root{

  *{margin:0;padding:0;box-sizing:border-box}
  body{

  .card{width:100%;max-width:420px;text-align:center}
  .monogram{
    width:76px;height:76px;margin:0 auto 20px;
    border:1px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:900;font-size:34px;color:var(--gold);

  .star{color:var(--gold-light);font-size:14px;letter-spacing:0;margin-bottom:10px}
  h1{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:30px;letter-spacing:.06em;line-height:1.1;
  }
  .eyebrow{
    text-transform:uppercase;letter-spacing:.34em;font-size:11px;
    color:var(--soft);font-weight:500;margin-top:6px;
  }
  .tagline{
    margin:18px auto 30px;max-width:300px;
    font-size:13.5px;line-height:1.65;color:var(--mid);
  }
  .links{display:flex;flex-direction:column;gap:14px}
  .btn{
    display:flex;align-items:center;gap:14px;
    padding:17px 22px;
    background:var(--white);
    border:1px solid var(--gold);border-radius:14px;
    text-decoration:none;color:var(--dark);
    font-size:15px;font-weight:500;
    transition:background .18s ease, transform .12s ease;
  }
  .btn:hover,.btn:focus-visible{background:var(--warm);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn svg{flex:0 0 22px;width:22px;height:22px;stroke:var(--gold);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .btn .wa{fill:var(--gold);stroke:none}
  .btn span small{display:block;font-weight:400;font-size:12px;color:var(--soft);margin-top:2px}
  .btn span{text-align:left}
  footer{
    margin-top:34px;font-size:11.5px;color:var(--soft);
    letter-spacing:.12em;text-transform:uppercase;
  }
  footer a{color:var(--soft);text-decoration:none}
  @media (prefers-reduced-motion: reduce){.btn{transition:none}}
